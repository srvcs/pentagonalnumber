schemaVersion: 1
name: "srvcs-pentagonalnumber"
slug: "pentagonalnumber"
repository: "srvcs/pentagonalnumber"
package: "srvcs-pentagonalnumber"
function: "sequences: nth pentagonal number"
kind: "orchestrator"
categories:
  - "sequences"
dependencies:
  - slug: "multiply"
    service: "srvcs-multiply"
  - slug: "divide"
    service: "srvcs-divide"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "integer"
    required: true
outputs:
  - name: "value"
    type: "integer"
  - name: "result"
    type: "integer"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_DIVIDE_URL"
    default: "http://127.0.0.1:8091"
    purpose: "Base URL for srvcs-divide"
  - name: "SRVCS_MULTIPLY_URL"
    default: "http://127.0.0.1:8090"
    purpose: "Base URL for srvcs-multiply"
